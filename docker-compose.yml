version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tickets_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickets_db
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: tickets_server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=tickets_db
      - DB_SYNC=true
      - DB_LOGGING=true
    depends_on:
      - db

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: tickets_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
